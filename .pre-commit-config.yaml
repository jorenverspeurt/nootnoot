repos:
  # ---------------------------
  # Rust format / lint / checks
  # ---------------------------
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: cargo-check
      - id: clippy

  # ---------------------------
  # Check for common security issues in dependencies
  # ---------------------------
  - repo: https://github.com/embarkstudios/cargo-deny
    rev: 0.18.9
    hooks:
      - id: cargo-deny
        args: ["check", "bans"]
      - id: cargo-deny
        args: ["check", "advisories"]
      - id: cargo-deny
        args: ["check", "sources"]

  # ---------------------------
  # YAML, TOML and JSON linting
  # ---------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: ["-d", "{extends: default, rules: {line-length: {max: 120}}}"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  # ---------------------------
  # Prettier for web UI assets
  # ---------------------------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: "^static/.*(js|css|html)$"

  # ---------------------------
  # Commitizen for conventional commits + versioning
  # ---------------------------
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.10.0
    hooks:
      # Enforce conventional commits on commit messages
      - id: commitizen
        stages: [commit-msg]

  # ---------------------------
  # Shell linting (Makefile, scripts)
  # ---------------------------
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        files: "\\.(sh|bash)$"

